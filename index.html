<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Control — Good Fitness Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      padding: 32px 24px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }

    header .logo {
      width: 42px;
      height: 42px;
      background: #22c55e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
    }

    header p {
      font-size: 13px;
      color: #6b7280;
      margin-top: 2px;
    }

    .refresh-btn {
      margin-left: auto;
      background: #1f1f1f;
      border: 1px solid #2d2d2d;
      color: #9ca3af;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .refresh-btn:hover { background: #2a2a2a; color: #e5e5e5; }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 14px;
      padding: 22px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 16px;
    }

    /* Estado global */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .status-badge.active { background: #052e16; color: #22c55e; border: 1px solid #166534; }
    .status-badge.paused { background: #2d0c00; color: #f97316; border: 1px solid #7c2d12; }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    .status-badge.active .status-dot { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-badge.paused .status-dot { background: #f97316; box-shadow: 0 0 6px #f97316; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      width: 100%;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-danger { background: #7f1d1d; color: #fca5a5; }
    .btn-danger:hover:not(:disabled) { background: #991b1b; }

    .btn-success { background: #14532d; color: #86efac; }
    .btn-success:hover:not(:disabled) { background: #166534; }

    .btn-outline {
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af;
    }

    .btn-outline:hover:not(:disabled) { background: #1f1f1f; color: #e5e5e5; }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      width: auto;
      border-radius: 7px;
    }

    /* Input */
    .input-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    input[type="text"] {
      flex: 1;
      background: #0f0f0f;
      border: 1px solid #2d2d2d;
      color: #e5e5e5;
      padding: 10px 14px;
      border-radius: 9px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #4b5563; }
    input[type="text"]::placeholder { color: #4b5563; }

    /* Lista de pausados */
    .paused-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .paused-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f0f0f;
      border: 1px solid #2d2d2d;
      border-radius: 9px;
      padding: 10px 14px;
    }

    .paused-phone {
      font-size: 14px;
      font-weight: 500;
      color: #e5e5e5;
    }

    .paused-id {
      font-size: 11px;
      color: #4b5563;
      margin-top: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 28px 0;
      color: #4b5563;
      font-size: 14px;
    }

    .empty-state span { display: block; font-size: 28px; margin-bottom: 8px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
      max-width: 320px;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok { background: #052e16; color: #22c55e; border: 1px solid #166534; }
    #toast.err { background: #2d0c00; color: #f97316; border: 1px solid #7c2d12; }

    .loader {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .section-full {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 16px;
    }

    /* Login */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .login-box {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 18px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-box .logo {
      width: 56px;
      height: 56px;
      background: #22c55e;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
    }

    .login-box h2 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .login-box p {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 28px;
    }

    .login-box input[type="password"] {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #2d2d2d;
      color: #e5e5e5;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      text-align: center;
      letter-spacing: 0.15em;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }

    .login-box input[type="password"]:focus { border-color: #22c55e; }

    .login-box .btn-login {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      color: #000;
      font-weight: 600;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .login-box .btn-login:hover { background: #16a34a; }

    .login-error {
      font-size: 13px;
      color: #f97316;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div class="logo">💪</div>
    <h2>Good Fitness</h2>
    <p>Panel de control del bot</p>
    <input type="password" id="loginInput" placeholder="Contraseña" autofocus />
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<header>
  <div class="logo">💪</div>
  <div>
    <h1>Good Fitness — Panel de Control</h1>
    <p>Gestión del bot de WhatsApp</p>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M23 4v6h-6M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
    Actualizar
  </button>
</header>

<div class="grid">

  <!-- Card: Estado Global -->
  <div class="card">
    <div class="card-title">Estado Global del Bot</div>
    <div id="globalBadge" class="status-badge active">
      <div class="status-dot"></div>
      <span id="globalText">Cargando...</span>
    </div>
    <div style="display:flex; gap:8px; margin-top:4px;">
      <button class="btn btn-danger" id="btnPauseGlobal" onclick="pauseGlobal()">
        ⏸ Pausar bot
      </button>
      <button class="btn btn-success" id="btnUnpauseGlobal" onclick="unpauseGlobal()">
        ▶ Reactivar bot
      </button>
    </div>
  </div>

  <!-- Card: Pausar número individual -->
  <div class="card">
    <div class="card-title">Pausar número individual</div>
    <p style="font-size:13px; color:#6b7280; margin-bottom:4px;">
      Ingresá el número con código de país, sin +
    </p>
    <div class="input-group">
      <input type="text" id="inputPause" placeholder="ej: 5491155667788" maxlength="20" />
      <button class="btn btn-danger btn-sm" style="width:auto;" onclick="pauseIndividual()">
        ⏸ Pausar
      </button>
    </div>
  </div>

</div>

<!-- Lista de pausados individuales -->
<div class="section-full">
  <div class="card-title" style="margin-bottom:16px;">
    Números pausados individualmente
    <span id="pausedCount" style="margin-left:8px; background:#1f1f1f; border:1px solid #374151; padding:2px 8px; border-radius:20px; font-size:11px; color:#9ca3af;">0</span>
  </div>
  <div id="pausedList" class="paused-list">
    <div class="empty-state"><span>✅</span>Sin números pausados</div>
  </div>
</div>

<div id="toast"></div>

<script>
  const BASE        = 'https://goodfitness-n8n.5ndw7a.easypanel.host/webhook';
  const KEY         = 'GF2026admin';
  const PANEL_PASS  = 'goodfitness2026';

  function doLogin() {
    const val = document.getElementById('loginInput').value;
    if (val === PANEL_PASS) {
      sessionStorage.setItem('gf_auth', '1');
      document.getElementById('loginScreen').style.display = 'none';
      loadAll();
    } else {
      const err = document.getElementById('loginError');
      err.textContent = 'Contraseña incorrecta';
      document.getElementById('loginInput').value = '';
      document.getElementById('loginInput').focus();
      setTimeout(() => { err.textContent = ''; }, 2500);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem('gf_auth') === '1') {
      document.getElementById('loginScreen').style.display = 'none';
      loadAll();
    }
    document.getElementById('loginInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  function toast(msg, type = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 3500);
  }

  async function api(method, path, body) {
    const url = `${BASE}/${path}?key=${KEY}`;
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    return res.json();
  }

  async function loadAll() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');

    try {
      const [status, global] = await Promise.all([
        api('GET', 'bot-status'),
        api('GET', 'global-status'),
      ]);

      // Estado global
      const badge  = document.getElementById('globalBadge');
      const text   = document.getElementById('globalText');
      const paused = global.global_paused;
      badge.className = `status-badge ${paused ? 'paused' : 'active'}`;
      text.textContent = paused ? 'Bot PAUSADO globalmente' : 'Bot ACTIVO';

      // Lista individuales
      const list  = document.getElementById('pausedList');
      const count = document.getElementById('pausedCount');
      const items = status.paused || [];
      count.textContent = items.length;

      if (items.length === 0) {
        list.innerHTML = '<div class="empty-state"><span>✅</span>Sin números pausados</div>';
      } else {
        list.innerHTML = items.map(item => `
          <div class="paused-item">
            <div>
              <div class="paused-phone">📱 +${item.phone}</div>
              <div class="paused-id">${item.full_id}</div>
            </div>
            <button class="btn btn-success btn-sm" onclick="unpauseNumber('${item.full_id}')">
              ▶ Reactivar
            </button>
          </div>
        `).join('');
      }

    } catch(e) {
      toast('Error al conectar con n8n', 'err');
    } finally {
      btn.classList.remove('spinning');
    }
  }

  async function pauseGlobal() {
    const btn = document.getElementById('btnPauseGlobal');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> Pausando...';
    try {
      const r = await api('POST', 'pause-global');
      toast(r.message || 'Bot pausado globalmente');
      await loadAll();
    } catch { toast('Error al pausar', 'err'); }
    finally {
      btn.disabled = false;
      btn.innerHTML = '⏸ Pausar bot';
    }
  }

  async function unpauseGlobal() {
    const btn = document.getElementById('btnUnpauseGlobal');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> Reactivando...';
    try {
      const r = await api('POST', 'unpause-global');
      toast(r.message || 'Bot reactivado globalmente');
      await loadAll();
    } catch { toast('Error al reactivar', 'err'); }
    finally {
      btn.disabled = false;
      btn.innerHTML = '▶ Reactivar bot';
    }
  }

  async function pauseIndividual() {
    const input = document.getElementById('inputPause');
    const phone = input.value.trim().replace(/\D/g, '');
    if (!phone) { toast('Ingresá un número válido', 'err'); return; }
    const chatId = `${phone}@s.whatsapp.net`;
    try {
      const r = await api('POST', 'pause-individual', { chatId });
      toast(r.message || `+${phone} pausado`);
      input.value = '';
      await loadAll();
    } catch { toast('Error al pausar número', 'err'); }
  }

  async function unpauseNumber(chatId) {
    try {
      const r = await api('POST', 'unpause', { chatId });
      toast(r.message || 'Número reactivado');
      await loadAll();
    } catch { toast('Error al reactivar', 'err'); }
  }

  document.getElementById('inputPause').addEventListener('keydown', e => {
    if (e.key === 'Enter') pauseIndividual();
  });
</script>

</body>
</html>
